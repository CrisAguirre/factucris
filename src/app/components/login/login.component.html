<div class="login-wrapper">
  <div class="glass-panel login-card">
    <div class="login-header" style="text-align: center; margin-bottom: 20px;">
      <img src="assets/logo.png" alt="Logo" style="width: 80px; height: auto; border-radius: 12px; margin-bottom: 15px;">
      <h2 style="color: var(--primary-color); margin: 0;">Gestión de Facturas</h2>
      <p class="subtitle" style="margin-top: 5px;">Sistema de Archivo</p>
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input type="text" class="form-control" name="user" [(ngModel)]="user" required placeholder="Escriba su usuario">
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" name="pass" [(ngModel)]="pass" required placeholder="••••••••">
      </div>

      <div class="error-banner" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;" [disabled]="!loginForm.valid">
        Ingresar al Sistema
      </button>
    </form>
  </div>
</div>
