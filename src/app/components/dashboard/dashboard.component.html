<div class="dashboard-layout">
  <aside class="sidebar glass-panel">
    <div class="sidebar-brand">
      <img src="assets/logo.png" alt="Logo" class="app-logo" style="width: 50px; height: auto; border-radius: 8px; margin-bottom: 10px;">
      <h3>Gestión de Facturas</h3>
      <span class="user-badge" style="margin-left: 5px;">Admin</span>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="./list" routerLinkActive="active-link" class="nav-item">
        📋 Histórico de Recibos
      </a>
      <a routerLink="./new" routerLinkActive="active-link" class="nav-item">
        ➕ Nuevo Recibo
      </a>
    </nav>
    
    <div class="sidebar-footer">
      <button class="btn-logout" (click)="onLogout()">Cerrar Sesión</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header glass-panel">
      <h4>Sistema de Archivo de Recibos</h4>
    </header>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
